[tool.ruff]
target-version = "py313"
line-length = 88
exclude = [
    "custom_components/up_bank/exampleJson",
    ".venv",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # import sorting
    "UP",   # pyupgrade (modern syntax, e.g. PEP 604 `X | None`)
    "B",    # flake8-bugbear (common bug patterns)
    "SIM",  # flake8-simplify
    "C4",   # flake8-comprehensions
    "ASYNC",# flake8-async (asyncio/async-await pitfalls)
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501", # line length is a formatting concern, not a lint one (ruff format handles it)
]

[tool.ruff.lint.per-file-ignores]
"dev/*" = ["F401", "F841"]  # scratch scripts: unused imports/vars are fine

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.13"
files = ["custom_components/up_bank"]
warn_return_any = true
warn_unused_ignores = true
warn_redundant_casts = true
